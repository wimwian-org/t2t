# basic theme — input for t2t (t2t)
#
# GAPS vs output.css that require t2t extensions:
#
#   1. `inverted = true` on [[palette]]: output.css step 50 = lightest shade;
#      t2t step 50 = darkest. Same var names, opposite values. With this flag
#      t2t would apply ramp(base, 1000-step) per step instead of ramp(base, step).
#
#   2. `@theme static` keyword: output.css pins palette vars into :root so
#      runtime JS / inline styles can access them. t2t emits plain @theme {}.
#
#   3. prefers-color-scheme: output.css also reacts to OS dark mode via a
#      media query. t2t only emits html[data-theme="dark"] {}.
#
#   4. @utility tint-* blocks: not yet a supported section type in t2t.
#
# All theme-sensitive token values use ramp() DSL — no oklch literals below.

[meta]
name    = "basic"
version = "0.1.0"

# ── Palettes ──────────────────────────────────────────────────────────────────
# Generates @theme { --color-<name>-<step>: ...; } via color_ramp().
# NOTE: pending `inverted = true`, step 50 will be the darkest shade (opposite
# of output.css). The VALUES are identical; only the step-name mapping differs.

[[palette]]
name  = "mono"
base  = "oklch(50% 0 0)"

[[palette]]
name  = "primary"
base  = "oklch(76% 0.15 232)"

[[palette]]
name  = "secondary"
base  = "oklch(62% 0.19 328)"

[[palette]]
name  = "tertiary"
base  = "oklch(79% 0.17 71)"

[[palette]]
name  = "error"
base  = "oklch(63% 0.26 29)"

[[palette]]
name  = "warning"
base  = "oklch(80% 0.18 103)"

[[palette]]
name  = "success"
base  = "oklch(74% 0.25 142)"

# ── Page / canvas elevation ────────────────────────────────────────────────────
[[token]]
comment = "Page and Canvas tokens"
name    = "--page-bg"
light   = "ramp(mono, 900)"

[[token]]
name  = "--page-fg"
light = "ramp(mono, 150)"

[[token]]
name  = "--page-border"
light = "ramp(mono, 75)"

[[token]]
name  = "--canvas-bg"
light = "ramp(mono, 800)"
muted = "0.75"
disabled = "0.60"

[[token]]
name  = "--canvas-fg"
light = "ramp(mono, 100)"
muted = "0.75"
disabled = "0.60"

[[token]]
name  = "--canvas-border"
light = "ramp(mono, 175)"
muted = "0.75"
disabled = "0.60"

# ── Shadow colour tokens ───────────────────────────────────────────────────────
# ramp(mono, 0) = oklch(0% 0 0) = pure black regardless of base

[[token]]
name    = "--shadow-umbra"
comment = "shadow colours"
light = "ramp(mono, 0, 0.14)"
dark  = "ramp(mono, 0, 0.44)"

[[token]]
name  = "--shadow-penumbra"
light = "ramp(mono, 0, 0.08)"
dark  = "ramp(mono, 0, 0.32)"

