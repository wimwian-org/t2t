# ── Static :root values (theme-independent) ───────────────────────────────────
# NOTE: fonts and type ramp ideally belong in @theme (Tailwind utility namespace)
# but t2t's @theme only accepts palette vars. Using [root] as fallback —
# vars are accessible but no font-sans / text-body-md utility classes are emitted.

[root]
# elevation (unitless dp values)
"--elevation-2xs" = "2.4"
"--elevation-xs"  = "4.32"
"--elevation-sm"  = "7.78"
"--elevation-md"  = "14"
"--elevation-lg"  = "25.2"
"--elevation-xl"  = "45.36"
"--elevation-2xl" = "81.65"

# shadow geometry — reference --shadow-umbra/penumbra set by [[token]] above
"--shadow-2xs" = "0 0.96px 2.16px -0.48px var(--shadow-umbra), 0 0.36px 0.96px -0.24px var(--shadow-penumbra)"
"--shadow-xs"  = "0 1.73px 3.89px -0.86px var(--shadow-umbra), 0 0.65px 1.73px -0.43px var(--shadow-penumbra)"
"--shadow-sm"  = "0 3.11px 7px -1.56px var(--shadow-umbra), 0 1.17px 3.11px -0.78px var(--shadow-penumbra)"
"--shadow-md"  = "0 5.6px 12.6px -2.8px var(--shadow-umbra), 0 2.1px 5.6px -1.4px var(--shadow-penumbra)"
"--shadow-lg"  = "0 10.08px 22.68px -5.04px var(--shadow-umbra), 0 3.78px 10.08px -2.52px var(--shadow-penumbra)"
"--shadow-xl"  = "0 18.14px 40.82px -9.07px var(--shadow-umbra), 0 6.8px 18.14px -4.54px var(--shadow-penumbra)"
"--shadow-2xl" = "0 32.66px 73.49px -16.33px var(--shadow-umbra), 0 12.25px 32.66px -8.17px var(--shadow-penumbra)"

[[font]]
name  = "sans"
stack = ["Noto Sans Display", "Inter", "sans-serif"]

[[font]]
name  = "mono"
stack = ["Noto Sans Mono", "Google Sans Code", "monospace"]

[text]
comment = "Text tokens — font families and type ramp"
weight = "500"
font-family = "font-sans"

[text.display]
comment = "Display text ramp"
weight = "600"
line-height = "1.3"
[text.display.xs]
size = "1.5rem"
line-height = "1.4"
[text.display.sm]
size = "1.875rem"
line-height = "1.4"
[text.display.md]
size = "2.25rem"
[text.display.lg]
size = "2.7rem"
[text.display.xl]
size = "3.375rem"
line-height = "1.2"

[text.title]
comment = "Title text ramp"
font-weight = "500"
line-height = "1.5"
[text.title.xs]
size = "1.25rem"
[text.title.sm]
size = "1.5rem"
[text.title.md]
size = "1.875rem"
line-height = "1.4"
[text.title.lg]
size = "2.25rem"
line-height = "1.3"
[text.title.xl]
size = "3rem"
lune-height = "1.2"

[text.heading]
comment = "Heading text ramp"
font-weight = "500"
line-height = "1.5"
[text.heading.xs]
size = "1rem"
[text.heading.sm]
size = "1.25rem"
[text.heading.md]
size = "1.5rem"
[text.heading.lg]
size = "1.875rem"
line-height = "1.4"
[text.heading.xl]
size = "2.25rem"
line-height = "1.3"

[text.body]
comment = "Body text ramp"
font-weight = "500"
line-height = "1.5"
[text.body.xs]
size = "0.75rem"
[text.body.sm]
size = "0.875rem"
[text.body.md]
size = "1rem"
[text.body.lg]
size = "1.125rem"
[text.body.xl]
size = "1.25rem"

[text.label]
comment = "Label text ramp"
font-weight = "700"
line-height = "1.5"
capitalize = true
small-caps = true
[text.label.xs]
size = "0.625rem"
[text.label.sm]
size = "0.75rem"
[text.label.md]
size = "0.875rem"
[text.label.lg]
size = "1rem"
[text.label.xl]
size = "1.125rem"

[text.code]
comment = "Code text ramp"
font-family = "font-mono"
font-weight = "500"
line-height = "1.6"
[text.code.xs]
size = "0.625rem"
[text.code.sm]
size = "0.875rem"
[text.code.md]
size = "1rem"
[text.code.lg]
size = "1.125rem"
[text.code.xl]
size = "1.25rem"

# ── color-scheme declarations ──────────────────────────────────────────────────
# [static] emits unlayered rules. The @media (prefers-color-scheme: dark) rule
# from output.css requires a new t2t section type — not expressible here yet.

[static]
":root"              = "color-scheme: light"
"[data-theme='light']" = "color-scheme: light"
"[data-theme='dark']"  = "color-scheme: dark"
