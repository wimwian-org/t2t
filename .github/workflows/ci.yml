name: CI

on:
  push:
    branches: [dev, "feature/**", "bugfix/**", "release/**", "hotfix/**"]
  pull_request:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest
